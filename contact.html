    .timeline {
  position: relative;
  max-width: 900px;
  margin: 3rem auto;
  padding-left: 40px;
}

/* Ligne verticale */
.timeline-line {
  position: absolute;
  left: 18px;
  top: 0;
  bottom: 0;
  width: 4px;
  background: linear-gradient(to bottom, #217dbb, #3e4858);
}

/* Item */
.timeline-item {
  position: relative;
  margin-bottom: 3rem;
}

/* Point sur la ligne */
.timeline-dot {
  position: absolute;
  left: -2px;
  top: 5px;
  width: 14px;
  height: 14px;
  background: #217dbb;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 0 0 3px rgba(33,125,187,0.2);
}

/* Contenu */
.timeline-content {
  margin-left: 30px;
}

/* Date */
.timeline-date {
  font-weight: bold;
  color: #217dbb;
  margin-bottom: 0.5rem;
}

/* Carte */
.timeline-card {
  background: white;
  padding: 1.2rem;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: transform 0.25s ease;
}

.timeline-card:hover {
  transform: translateY(-3px);
}

/* Texte principal */
.main-text {
  font-size: 0.95rem;
  margin-top: 0.5rem;
}

/* Texte secondaire (plus petit comme tu veux) */
.sub-text {
  font-size: 0.8rem;
  color: #666;
  margin-top: 0.4rem;
}

/* Badges */
.badges {
  margin-top: 0.6rem;
}

.badge {
  display: inline-block;
  background: rgba(33,125,187,0.2);
  color: #217dbb;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 0.75rem;
  margin-right: 5px;
}
    
    .container {

    /* Photo profil */
    .photo-container {
      flex: 1 1 280px;
      max-width: 300px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);

    .photo-container:hover {
      transform: scale(1.05);
    }
    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Texte présentation */
    .content {
      flex: 2 1 500px;
      animation: fadeIn 1s ease;
    }
    .content h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #000000;
    }
    .content p {
      margin-bottom: 1rem;
      font-size: 1.05rem;
    }

    /* Image responsive */
    .responsive-image {
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      margin: 2rem 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      transition: transform 0.4s ease;
    }
    .responsive-image:hover {
      transform: scale(1.03);
    }

    /* Section partenaires */
    h2.section-title {
      text-align: center;
      margin: 3rem 0 2rem;
      font-size: 2rem;
      color: #444;
    }

    .partners-grid {
      display: grid;
      grid-template-columns:  repeat(3, 1fr);
      gap: 1rem;
     /* max-width: 900px;
      margin: 2rem auto 4rem;
      padding: 0 1rem;*/
      justify-items: center;
      align-items: center;
    }

    .partner-card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .partner-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }
    .partner-card img {
      max-width: 90px;
      max-height: 55px;
      object-fit: block;
      margin-bottom: 0;
    }

    /* Keywords grid */
  .keywords-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }

  .keyword {
    background: rgba(33,125,187,0.2);
    color: #217dbb;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    cursor: default;
  }

/*  .keyword:hover {

  /* Bouton CV */

    font-weight: 600;
    color: #fff;
    background: #3e4858;
    /*background: linear-gradient(90deg, #09090a, #3e4858);*/
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-primary:hover {

    background: #217dbb;
  transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);

.event {

.event-details p {

  color: #000000;
  font-size: 0.95rem;
}
