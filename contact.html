    .timeline {
  position: relative;
  max-width: 900px;
  margin: 3rem auto;
  padding-left: 40px;
}

/* Ligne verticale */
.timeline-line {
  position: absolute;
  left: 18px;
  top: 0;
  bottom: 0;
  width: 4px;
  background: linear-gradient(to bottom, #217dbb, #3e4858);
}

/* Item */
.timeline-item {
  position: relative;
  margin-bottom: 3rem;
}

/* Point sur la ligne */
.timeline-dot {
  position: absolute;
  left: -2px;
  top: 5px;
  width: 14px;
  height: 14px;
  background: #217dbb;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 0 0 3px rgba(33,125,187,0.2);
}

/* Contenu */
.timeline-content {
  margin-left: 30px;
}

/* Date */
.timeline-date {
  font-weight: bold;
  color: #217dbb;
  margin-bottom: 0.5rem;
}

/* Carte */
.timeline-card {
  background: white;
  padding: 1.2rem;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: transform 0.25s ease;
}

.timeline-card:hover {
  transform: translateY(-3px);
}

/* Texte principal */
.main-text {
  font-size: 0.95rem;
  margin-top: 0.5rem;
}

/* Texte secondaire (plus petit comme tu veux) */
.sub-text {
  font-size: 0.8rem;
  color: #666;
  margin-top: 0.4rem;
}

/* Badges */

  margin-top: 0.6rem;
}

.badge {

  color: #217dbb;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 0.75rem;
  margin-right: 5px;
}
